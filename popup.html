<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>AI Translator</title>
    <style>
      body { font-family: sans-serif; width: 280px; margin: 12px; }
      .row { margin-bottom: 10px; }
      label { display: block; margin-bottom: 4px; font-size: 12px; color: #444; }
      input, select, button { width: 100%; padding: 8px; box-sizing: border-box; }
    </style>
  </head>
  <body>
    <div class="row">
      <label>Provider</label>
      <select id="provider">
        <option value="DeepL">DeepL</option>
        <option value="GoogleTranslate">Google Translate</option>
        <option value="Custom">Custom API</option>
      </select>
    </div>
    <div class="row">
      <label>API Key</label>
      <input id="apiKey" type="password" placeholder="输入 API Key" />
    </div>
    <div class="row">
      <label>目标语言</label>
      <input id="targetLang" type="text" value="zh" />
    </div>
    <div class="row">
      <button id="save">保存配置</button>
    </div>
    <div class="row">
      <button id="translatePage">翻译当前页面</button>
    </div>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
